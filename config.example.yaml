# ============================================================================
# Tool Groups Configuration
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash
  - name: knowledge

# ============================================================================
# Tools Configuration
# ============================================================================
tools:
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: deerflow.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: deerflow.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

  - name: onyx_search
    group: knowledge
    use: deerflow.community.onyx.tools:onyx_search_tool
    num_hits: 5

# ============================================================================
# Tool Search Configuration
# ============================================================================
tool_search:
  enabled: true

# ============================================================================
# Uploads
# ============================================================================
uploads:
  max_files: 10
  max_file_size: 52428800
  max_total_size: 104857600
  auto_convert_documents: false
  pdf_converter: auto

# ============================================================================
# Sandbox Configuration
# ============================================================================
sandbox:
  use: deerflow.community.aio_sandbox:AioSandboxProvider
  image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
  port: 39120
  replicas: 2
  container_prefix: deer-flow-aio-sandbox
  idle_timeout: 1800
  allow_host_bash: false
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000
  mounts:
    - host_path: /home/ubuntu/aisci
      container_path: /mnt/host/aisci
      read_only: false
  environment:
    PYTHONUNBUFFERED: "1"

# ============================================================================
# Subagents Configuration
# ============================================================================
subagents:
  timeout_seconds: 900
  max_turns: 120
  agents:
    general-purpose:
      timeout_seconds: 1800
      max_turns: 160
    bash:
      timeout_seconds: 300
      max_turns: 80

# ============================================================================
# Skills Configuration
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# Skill Self-Evolution
# ============================================================================
skill_evolution:
  enabled: true
  moderation_model_name: null

# ============================================================================
# Title Generation
# ============================================================================
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization
# ============================================================================
# NOTE: trim_tokens_to_summarize, summary_prompt, and preserve_* keys must be
# siblings of keep:, NOT nested inside it. Indenting them under keep: causes
# them to be silently ignored by the config parser.
summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
    - type: messages
      value: 50
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null
  preserve_recent_skill_count: 5
  preserve_recent_skill_tokens: 25000
  preserve_recent_skill_tokens_per_skill: 5000
  skill_file_read_tool_names:
    - read_file
    - read
    - view
    - cat

# ============================================================================
# Memory
# ============================================================================
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ============================================================================
# Database
# ============================================================================
# Unified storage backend for LangGraph checkpointer and DeerFlow application
# data (runs, threads metadata, feedback, etc.).
#
# DO NOT add a legacy `checkpointer:` block alongside this. When both are
# present, LangGraph state goes into a separate checkpoints.db while run/thread
# app data goes into sqlite_dir — two files that drift out of sync.
database:
  backend: sqlite
  sqlite_dir: .deer-flow/data

# ============================================================================
# Run Events
# ============================================================================
# IMPORTANT: Use backend: db (not memory).
# With backend: memory, GET /runs/{run_id} returns HTTP 404 because run state
# is never written to persistent storage. The db backend writes run events into
# the same SQLite file as the database section above.
run_events:
  backend: db
  max_trace_content: 10240
  track_token_usage: true
